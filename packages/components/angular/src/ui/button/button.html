@if (iconPlacement() === 'start') {
<span [class]="startIconClassName()" data-icon="inline-start">
  @if (loading()) {
  <ng-container [ngTemplateOutlet]="spinnerTemplate" />
  } @else {
  <ng-content select="[slot=start]" />
  }
</span>
}

<ng-content />

@if (iconPlacement() === 'end') {
<span [class]="endIconClassName()" data-icon="inline-end">
  @if (loading()) {
  <ng-container [ngTemplateOutlet]="spinnerTemplate" />
  } @else {
  <ng-content select="[slot=end]" />
  }
</span>
}

<ng-template #spinnerTemplate>
  <svg
    [class]="spinnerClassName"
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
    aria-hidden="true"
  >
    <path d="M21 12a9 9 0 1 1-6.219-8.56" />
  </svg>
</ng-template>
