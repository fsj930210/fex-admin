@if (showStartIcon()) {
<span [class]="startIconClassName()" data-icon="inline-start">
  @if (loading()) {
  <fex-loading-icon [class]="spinnerClassName" />
  } @else {
  <ng-content select="[slot=start]" />
  }
</span>
}

<ng-content />

@if (showEndIcon()) {
<span [class]="endIconClassName()" data-icon="inline-end">
  @if (loading()) {
  <fex-loading-icon [class]="spinnerClassName" />
  } @else {
  <ng-content select="[slot=end]" />
  }
</span>
}
