<fex-card
  title="Row pinning"
  description="Pinned rows are opaque layers above the scrollable center region. Their edge shadow appears only at the boundary, and the controls can add more rows to either region."
>
  <section class="space-y-space-sm">
    <h3 class="text-sm font-medium text-foreground">Top, scrollable center and bottom</h3>
    <fex-data-grid [table]="table" [partClass]="gridClass">
      <ng-template fexDataGridCell let-cell>
        @if (cell.column.id === 'name') {
          <span class="inline-flex items-center gap-2">
            @if (pinned(cell); as position) {
              <fex-badge variant="outline">Pinned {{ position }}</fex-badge>
            }
            {{ cell.row.original.name }}
          </span>
        } @else if (cell.column.id === 'pin') {
          <span class="inline-flex gap-1">
            <button fexButton size="sm" variant="outline" (click)="pin(cell, 'top')">Top</button>
            <button fexButton size="sm" variant="outline" (click)="pin(cell, false)">Center</button>
            <button fexButton size="sm" variant="outline" (click)="pin(cell, 'bottom')">
              Bottom
            </button>
          </span>
        } @else {
          {{ cell.getValue() }}
        }
      </ng-template>
    </fex-data-grid>
  </section>
</fex-card>
