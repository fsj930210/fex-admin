<fex-card
  title="Column sorting"
  description="Multi-sort is supported for local columns as well: each click adds or changes a priority and the superscript shows that priority. Columns without meta.sortFn remain remote terms in the same sorting state, while their pass-through comparator leaves local row order unchanged."
>
  <div class="grid gap-space-lg xl:grid-cols-2">
    @for (grid of grids; track grid.title) {
      <section class="space-y-space-sm">
        <h3 class="text-sm font-medium text-foreground">{{ grid.title }}</h3>
        <fex-data-grid [table]="grid.table">
          <ng-template fexDataGridHeader let-header>
            <button
              fexButton
              variant="ghost"
              type="button"
              [class]="sortButtonClassName"
              [attr.aria-pressed]="direction(header) || null"
              (click)="sort(header, $event)"
            >
              <span>{{ header.column.columnDef.header }}</span>
              <span class="inline-flex items-center" aria-hidden="true">
                @if (direction(header) === 'asc') { <fex-chevron-up-icon class="block size-3.5" /> }
                @else if (direction(header) === 'desc') { <fex-chevron-down-icon class="block size-3.5" /> }
                @else { <span class="relative inline-block size-3.5"><fex-chevron-up-icon class="absolute inset-x-0 top-0 block size-3" /><fex-chevron-down-icon class="absolute inset-x-0 bottom-0 block size-3" /></span> }
                @if (direction(header) && sortIndex(header) >= 0) {
                  <sup>{{ sortIndex(header) + 1 }}</sup>
                }
              </span>
            </button>
          </ng-template>
        </fex-data-grid>
        <p class="text-xs text-muted-foreground">
          Remote request sorting: {{ remote(grid).length ? remote(grid).length : 'none' }}
        </p>
      </section>
    }
  </div>
</fex-card>
