<main class="min-h-screen bg-secondary-background px-page-padding py-space-xl">
  <div class="mx-auto w-full max-w-5xl space-y-space-xl">
    <header class="space-y-space-xl">
      <a class="text-sm text-muted-foreground hover:text-foreground" routerLink="/">Back home</a>
      <div>
        <h1 class="text-2xl font-semibold text-foreground">Switch</h1>
        <p class="mt-space-md max-w-2xl text-sm leading-6 text-muted-foreground">Boolean toggle UI with controlled and uncontrolled usage.</p>
      </div>
    </header>
    <div class="space-y-space-xl">
      <fex-card title="Basic" description="Uncontrolled switch uses defaultChecked."><button fexSwitchPrimitive defaultChecked aria-label="Enable notifications"><span fexSwitchThumb></span></button></fex-card>
      <fex-card title="Controlled" description="Controlled switch uses checked and checkedChange."><div class="grid gap-space-md"><button fexSwitchPrimitive [checked]="checked()" (checkedChange)="checked.set($event.checked)" aria-label="Controlled switch"><span fexSwitchThumb></span></button><p class="text-sm text-muted-foreground">Current value: {{ checked() }}</p></div></fex-card>
      <fex-card title="Sizes" description="Switch supports sm, default, and lg sizes."><div class="flex items-center gap-space-md"><button fexSwitchPrimitive size="sm" defaultChecked aria-label="Small switch"><span fexSwitchThumb size="sm"></span></button><button fexSwitchPrimitive defaultChecked aria-label="Default switch"><span fexSwitchThumb></span></button><button fexSwitchPrimitive size="lg" defaultChecked aria-label="Large switch"><span fexSwitchThumb size="lg"></span></button></div></fex-card>
      <fex-card title="Disabled" description="Disabled state blocks interaction."><div class="flex items-center gap-space-md"><button fexSwitchPrimitive disabled aria-label="Disabled switch"><span fexSwitchThumb></span></button><button fexSwitchPrimitive disabled defaultChecked aria-label="Disabled checked switch"><span fexSwitchThumb></span></button></div></fex-card>
    </div>
  </div>
</main>
