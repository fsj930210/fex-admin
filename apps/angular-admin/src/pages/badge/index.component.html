<main class="min-h-screen bg-secondary-background px-page-padding py-space-xl">
  <div class="mx-auto w-full max-w-5xl space-y-space-xl">
    <header class="space-y-space-md"><a class="text-sm text-muted-foreground hover:text-foreground" routerLink="/">返回首页</a><h1 class="text-2xl font-semibold text-foreground">Badge</h1><p class="max-w-2xl text-sm leading-6 text-muted-foreground">用于短文本状态、分类和计数标记。</p></header>
    <fex-card title="Variants" description="覆盖全部公开 variant。"><div class="flex min-w-0 flex-wrap items-center gap-space-md">@for (variant of variants; track variant) {<fex-badge [variant]="variant">{{ variant }}</fex-badge>}</div></fex-card>
  </div>
</main>
