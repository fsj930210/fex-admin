<fex-card
  title="Virtualization and locate"
  description="Only viewport rows mount. scrollToKey resolves a visible index before asking TanStack Virtual to scroll."
  ><div class="mb-space-md flex gap-space-sm">
    <button
      fexButton
      size="sm"
      variant="outline"
      (click)="viewport().scrollToKey('large-3200', { reveal: true, align: 'start' })"
    >
      Locate row 3201
    </button>
  </div>
  <fex-demo-tree
    [options]="options"
    [virtual]="true"
    [height]="320"
    class="block rounded-md border border-border bg-background p-space-sm"
/></fex-card>
