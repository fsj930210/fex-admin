<fex-card title="Optional drag and drop feature" description="This example uses a custom 24px indent. Vertical edge zones reorder; in the middle zone, dropping in the target row's trailing half makes the source a child, while moving left can outdent it."><fex-tree [controller]="controller" [indent]="24" class="block max-w-xl rounded-md border border-border bg-background p-space-sm"><fex-tree-viewport><ng-template let-item><div [fexTreeItem]="item.key" #treeItem="fexTreeItem" fexTreeDndItem>@if (!item.isLeaf) {<button fexTreeTrigger><fex-chevron-down-icon class="size-4" /></button>} @else {<span aria-hidden="true" class="size-5 shrink-0"></span>}<span fexTreeTitle>{{ item.node.name }}</span></div></ng-template></fex-tree-viewport></fex-tree></fex-card>
