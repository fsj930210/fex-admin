<div [fexTreeItem]="item().key" #treeItem="fexTreeItem">
  @if (treeItem.loadState() === 'loading') { <fex-spinner size="sm" aria-label="Loading children" /> }
  @else if (!item().isLeaf && tree().hasFeature('expansion')) { <button fexTreeTrigger><fex-chevron-down-icon class="size-4" /></button> }
  @else { <span aria-hidden="true" class="size-5 shrink-0"></span> }
  @if (checkable() && tree().hasFeature('check')) { <button fexCheckbox [checked]="treeItem.checkedState()" [disabled]="item().disabled" (click)="$event.stopPropagation()" (checkedChange)="treeItem.toggleChecked()"></button> }
  <span fexTreeTitle>{{ parts().before }}@if (parts().match) {<mark class="rounded-sm bg-warning/20 px-0.5 text-inherit">{{ parts().match }}</mark>}{{ parts().after }}</span>
</div>
