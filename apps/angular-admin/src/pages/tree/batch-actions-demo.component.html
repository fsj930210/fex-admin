<fex-card title="Controller batch actions" description="All batch operations are explicit controller actions. selectAll only acts when multiple selection is enabled."><div class="mb-space-md flex flex-wrap gap-space-sm"><button fexButton size="sm" variant="outline" (click)="expansion()?.expandAll()">Expand all</button><button fexButton size="sm" variant="outline" (click)="expansion()?.collapseAll()">Collapse all</button><button fexButton size="sm" variant="outline" (click)="selection()?.selectAll()">Select all</button><button fexButton size="sm" variant="outline" (click)="selection()?.clear()">Clear selection</button><button fexButton size="sm" variant="outline" (click)="check()?.checkAll()">Check all</button><button fexButton size="sm" variant="outline" (click)="check()?.clear()">Clear checks</button></div><fex-demo-tree [controller]="controller" [options]="options" [checkable]="true" class="block max-w-xl rounded-md border border-border bg-background p-space-sm" /></fex-card>
