<main class="min-h-screen bg-secondary-background px-page-padding py-space-xl">
  <div class="mx-auto w-full max-w-5xl space-y-space-xl">
    <header class="space-y-space-md"><a class="text-sm text-muted-foreground hover:text-foreground" routerLink="/">返回首页</a><h1 class="text-2xl font-semibold text-foreground">Spinner</h1><p class="max-w-2xl text-sm leading-6 text-muted-foreground">用于局部加载反馈。</p></header>
    <fex-card title="Sizes" description="覆盖全部公开 size。"><div class="flex min-w-0 flex-wrap items-center gap-space-lg">@for (size of sizes; track size) {<fex-spinner [size]="size" [attr.aria-label]="size + ' loading'" />}</div></fex-card>
  </div>
</main>
