<main class="min-h-screen bg-secondary-background px-page-padding py-space-xl">
  <div class="mx-auto w-full max-w-5xl space-y-space-xl">
    <header class="space-y-space-md"><a class="text-sm text-muted-foreground hover:text-foreground" routerLink="/">返回首页</a><h1 class="text-2xl font-semibold text-foreground">Input primitives</h1><p class="max-w-2xl text-sm leading-6 text-muted-foreground">原生输入、值状态、前后缀、附加内容与清空行为均由独立 primitive 显式组合。</p></header>

    <div class="space-y-space-xl">
      <fex-card title="Basic" description="InputRoot 管理输入协议，InputControl 保留原生 input 语义。"><fex-input-root class="max-w-md"><input fexInputControl name="email" placeholder="admin@example.com" type="email" /></fex-input-root></fex-card>
      <fex-card title="Controlled and uncontrolled" description="受控值由调用方维护；非受控值只声明初始值。"><div class="grid gap-space-lg md:grid-cols-2"><div class="space-y-space-sm"><fex-input-root [value]="controlledValue" (valueChange)="controlledValue = $event"><input fexInputControl aria-label="受控输入" placeholder="受控输入" /></fex-input-root><p class="text-sm text-muted-foreground">受控值：{{ controlledValue || '（空）' }}</p></div><fex-input-root defaultValue="uncontrolled-value"><input fexInputControl aria-label="非受控输入" placeholder="非受控输入" /></fex-input-root></div></fex-card>
      <fex-card title="Prefix" description="InputPrefix 位于输入框内部、原生输入内容之前。"><fex-input-root class="max-w-md"><span fexInputPrefix aria-hidden="true">@</span><input fexInputControl aria-label="用户名" placeholder="username" /></fex-input-root></fex-card>
      <fex-card title="Suffix" description="InputSuffix 位于输入框内部、原生输入内容之后。"><fex-input-root class="max-w-md"><input fexInputControl aria-label="域名" placeholder="example" /><span fexInputSuffix>.com</span></fex-input-root></fex-card>
      <fex-card title="Addons" description="AddonBefore 和 AddonAfter 位于输入框两端，并与 Root 边框连成整体。"><fex-input-root class="max-w-xl"><span fexInputAddonBefore>https://</span><input fexInputControl aria-label="站点地址" placeholder="example" /><span fexInputAddonAfter>/console</span></fex-input-root></fex-card>
      <fex-card title="Clear" description="InputClear 仅在有值且可编辑时显示，清空后恢复输入焦点。"><fex-input-root defaultValue="clearable-value" class="max-w-md"><input fexInputControl aria-label="可清空输入" /><button fexInputClear aria-label="清空输入"></button></fex-input-root></fex-card>
      <fex-card title="Manual focus and clear" description="调用方可以通过原生 ref 聚焦或移除焦点，并通过受控值手动清空。"><div class="max-w-md space-y-space-md"><fex-input-root [value]="manualValue" (valueChange)="manualValue = $event"><input #focusControl fexInputControl aria-label="手动控制输入" placeholder="手动控制输入" /></fex-input-root><div class="flex flex-wrap gap-space-sm"><button fexButton size="sm" (click)="focusControl.focus()">聚焦</button><button fexButton size="sm" variant="outline" (click)="focusControl.blur()">移除焦点</button><button fexButton size="sm" variant="outline" (click)="manualValue = ''">手动清空</button></div></div></fex-card>
      <fex-card title="States" description="禁用、只读和校验失败状态由 Root 统一下发。"><div class="grid gap-space-lg md:grid-cols-3"><fex-input-root [disabled]="true" defaultValue="禁用内容"><input fexInputControl aria-label="禁用示例" /></fex-input-root><fex-input-root [readOnly]="true" defaultValue="只读内容"><input fexInputControl aria-label="只读示例" /></fex-input-root><fex-input-root [invalid]="true"><input fexInputControl aria-label="错误示例" placeholder="校验失败" /></fex-input-root></div></fex-card>
    </div>
  </div>
</main>
