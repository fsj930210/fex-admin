<main class="min-h-screen bg-secondary-background px-page-padding py-space-xl">
  <div class="mx-auto w-full max-w-5xl space-y-space-xl">
    <header class="space-y-space-xl">
      <a class="text-sm text-muted-foreground hover:text-foreground" routerLink="/">返回首页</a>
      <div>
        <h1 class="text-2xl font-semibold text-foreground">Card</h1>
        <p class="mt-space-md max-w-2xl text-sm leading-6 text-muted-foreground">
          用于承载相关内容、示例分组和管理后台中的紧凑信息块。
        </p>
      </div>
    </header>

    <div class="space-y-space-xl">
      <fex-card title="Primitive" description="卡片底层结构与 slot 语义。">
        <div class="flex min-w-0 flex-wrap items-center gap-space-md">
          <fex-card-primitive class="w-full">
            <fex-card-header class="border-b border-border">
              <fex-card-title>Primitive card</fex-card-title>
              <fex-card-description>底层结构展示。</fex-card-description>
            </fex-card-header>
            <fex-card-content>Content</fex-card-content>
          </fex-card-primitive>
        </div>
      </fex-card>

      <fex-card title="Ui" description="面向业务的默认卡片封装。">
        <div class="flex min-w-0 flex-wrap items-center gap-space-md">
          <fex-card title="Basic" description="包含标题、描述和内容区域。">
            <p class="text-sm leading-6 text-foreground">
              Card 默认使用系统边框、背景、圆角和 spacing token。
            </p>
          </fex-card>
        </div>
      </fex-card>

      <fex-card title="Basic" description="包含标题、描述和内容区域的标准卡片结构。">
        <p class="text-sm leading-6 text-foreground">
          Card 默认使用系统边框、背景、圆角和 spacing token，适合作为组件示例页的基础展示容器。
        </p>
      </fex-card>

      <ng-template #footerTemplate>
        <span class="text-sm text-muted-foreground">Footer content</span>
      </ng-template>

      <fex-card title="With Footer" description="需要底部操作区时使用 footer。" [footer]="footerTemplate">
        <p class="text-sm leading-6 text-muted-foreground">
          Header、Content 和 Footer 分别维护自己的 padding，组合时保持一致的信息密度。
        </p>
      </fex-card>
    </div>
  </div>
</main>
