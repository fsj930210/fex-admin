<fex-card title="Add, remove and extra" description="Application data drives primitive Items and Contents."><div fexTabsRoot [value]="value()" (change)="value.set($event.value ?? '')" (close)="remove($event.value)"><div class="flex min-w-0 items-center gap-space-sm"><span class="text-xs text-muted-foreground">Workspace</span><div fexTabsList class="min-w-0 flex-1">@for (item of items(); track item.value) { <div fexTabsItem #tab="fexTabsItem" [value]="item.value" [closable]="item.closable ?? false">{{ item.label }} @if (item.closable) { <button type="button" class="grid size-4 place-items-center" aria-label="Close tab" (pointerdown)="$event.stopPropagation()" (click)="tab.requestClose($event)"><fex-close-icon class="size-4" /></button> }</div> }</div><button class="rounded-md border border-border px-2 py-1 text-xs" type="button" (click)="add()">Add</button></div>@for (item of items(); track item.value) { <div *fexTabsContent="item.value">{{ item.content }}</div> }</div></fex-card>
