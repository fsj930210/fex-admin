<main class="min-h-screen bg-secondary-background px-page-padding py-space-xl">
  <div class="mx-auto w-full max-w-5xl space-y-space-xl">
    <header class="space-y-space-xl">
      <a class="text-sm text-muted-foreground hover:text-foreground" routerLink="/">Back home</a>
      <div><h1 class="text-2xl font-semibold text-foreground">Resizable</h1><p class="mt-space-md max-w-2xl text-sm leading-6 text-muted-foreground">Split panel layout component for sidebars and workspace surfaces.</p></div>
    </header>
    <div class="space-y-space-xl">
      <fex-card title="Horizontal" description="Pointer and keyboard resizing with min and max constraints."><div class="grid h-72 overflow-hidden rounded-md border border-border bg-background" [ngStyle]="gridStyle('horizontal', horizontalLayout())"><div data-resizable-panel="sidebar" class="p-space-md"><h2 class="text-sm font-medium">Sidebar</h2><p class="mt-space-sm text-sm text-muted-foreground">Resize from the handle.</p></div><button data-resizable-handle type="button" class="relative flex cursor-col-resize touch-none items-center justify-center outline-none focus-visible:bg-muted-background after:h-full after:w-px after:bg-border" (pointerdown)="startHorizontalResize($event)" (keydown)="resizeHorizontalByKey($event)"></button><div data-resizable-panel="content" class="p-space-md"><h2 class="text-sm font-medium">Content</h2><p class="mt-space-sm text-sm text-muted-foreground">Use arrow keys while the handle is focused.</p></div></div></fex-card>
      <fex-card title="Vertical" description="Use a vertical group for stacked panels."><div class="grid h-80 overflow-hidden rounded-md border border-border bg-background" [ngStyle]="gridStyle('vertical', verticalLayout())"><div data-resizable-panel="header" class="p-space-md"><h2 class="text-sm font-medium">Header</h2><p class="mt-space-sm text-sm text-muted-foreground">Resize vertically.</p></div><button data-resizable-handle type="button" class="relative flex cursor-row-resize touch-none items-center justify-center outline-none focus-visible:bg-muted-background after:h-px after:w-full after:bg-border" (pointerdown)="startVerticalResize($event)" (keydown)="resizeVerticalByKey($event)"></button><div data-resizable-panel="main" class="p-space-md"><h2 class="text-sm font-medium">Content</h2></div></div></fex-card>
      <fex-card title="Nested" description="Horizontal and vertical groups can be composed in one frame."><div class="grid h-96 overflow-hidden rounded-md border border-border bg-background" [ngStyle]="gridStyle('horizontal', nestedLayout())"><div data-resizable-panel="nested-sidebar" class="p-space-md">Sidebar</div><button data-resizable-handle type="button" class="relative cursor-col-resize touch-none outline-none focus-visible:bg-muted-background after:block after:h-full after:w-px after:bg-border" (pointerdown)="startNestedResize($event)" (keydown)="resizeNestedByKey($event)"></button><div data-resizable-panel="nested-workspace" class="grid" [ngStyle]="gridStyle('vertical', nestedVerticalLayout())"><div data-resizable-panel="nested-editor" class="p-space-md">Editor</div><button data-resizable-handle type="button" class="relative cursor-row-resize touch-none outline-none focus-visible:bg-muted-background after:block after:h-px after:w-full after:bg-border" (pointerdown)="startNestedVerticalResize($event)" (keydown)="resizeNestedVerticalByKey($event)"></button><div data-resizable-panel="nested-console" class="p-space-md">Console</div></div></div></fex-card>
      <fex-card title="Disabled Handle" description="A disabled handle keeps the layout fixed."><div class="grid h-48 grid-cols-[35%_12px_1fr] overflow-hidden rounded-md border border-border bg-background"><div class="p-space-md">Locked</div><button data-resizable-handle type="button" disabled class="relative cursor-not-allowed opacity-50 after:block after:h-full after:w-px after:bg-border"></button><div class="p-space-md">Fixed layout</div></div></fex-card>
    </div>
  </div>
</main>
