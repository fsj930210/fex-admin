<main class="min-h-screen bg-secondary-background px-page-padding py-space-xl"><div class="mx-auto w-full max-w-5xl space-y-space-xl"><header class="space-y-space-md"><a class="text-sm text-muted-foreground hover:text-foreground" routerLink="/">Back home</a><h1 class="text-2xl font-semibold text-foreground">Alert</h1><p class="max-w-2xl text-sm leading-6 text-muted-foreground">Show status messages with clear semantics.</p></header><fex-card title="Primitive" description="Structure with icon, title, description, and action."><div class="grid gap-space-md">@for (variant of variants; track variant) { <fex-alert [variant]="variant"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10" /><path d="M12 8v4" /><path d="M12 16h.01" /></svg><fex-alert-title>{{ variant }}</fex-alert-title><fex-alert-description>The current task is in {{ variant }} state. Continue with the page action.</fex-alert-description><fex-alert-action><fex-badge variant="outline">New</fex-badge></fex-alert-action></fex-alert> }</div></fex-card></div></main>
