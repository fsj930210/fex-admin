<main class="min-h-screen bg-secondary-background px-page-padding py-space-xl"><div class="mx-auto w-full max-w-5xl space-y-space-xl"><header class="space-y-space-md"><a class="text-sm text-muted-foreground hover:text-foreground" routerLink="/">Back home</a><h1 class="text-2xl font-semibold text-foreground">Table</h1><p class="max-w-2xl text-sm leading-6 text-muted-foreground">Basic table structure without built-in sorting, selection, or pagination.</p></header><fex-card title="Primitive" description="Caption, header, body, row, and cell slots."><table fexTable><caption fexTableCaption>Latest three invoices</caption><thead fexTableHeader><tr fexTableRow><th fexTableHead>Invoice</th><th fexTableHead>Customer</th><th fexTableHead>Status</th><th fexTableHead class="text-right">Amount</th></tr></thead><tbody fexTableBody>@for (invoice of invoices; track invoice.id) { <tr fexTableRow><td fexTableCell class="font-medium">{{ invoice.id }}</td><td fexTableCell>{{ invoice.customer }}</td><td fexTableCell><fex-badge variant="outline">{{ invoice.status }}</fex-badge></td><td fexTableCell class="text-right">{{ invoice.amount }}</td></tr> }</tbody></table></fex-card></div></main>
