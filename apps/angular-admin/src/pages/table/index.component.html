<main class="min-h-screen bg-secondary-background px-page-padding py-space-xl">
  <div class="mx-auto w-full max-w-5xl space-y-space-xl">
    <header class="space-y-space-md"><a class="text-sm text-muted-foreground hover:text-foreground" routerLink="/">返回首页</a><h1 class="text-2xl font-semibold text-foreground">Table</h1><p class="max-w-2xl text-sm leading-6 text-muted-foreground">基础表格结构，不内置排序、选择和分页。</p></header>
    <fex-card title="Primitive" description="caption、header、body、row 和 cell slot。"><table fex-table><caption fex-table-caption>最近三条账单记录</caption><thead fex-table-header><tr fex-table-row><th fex-table-head>Invoice</th><th fex-table-head>Customer</th><th fex-table-head>Status</th><th fex-table-head class="text-right">Amount</th></tr></thead><tbody fex-table-body>@for (invoice of invoices; track invoice.id) {<tr fex-table-row><td fex-table-cell class="font-medium">{{ invoice.id }}</td><td fex-table-cell>{{ invoice.customer }}</td><td fex-table-cell><fex-badge variant="outline">{{ invoice.status }}</fex-badge></td><td fex-table-cell class="text-right">{{ invoice.amount }}</td></tr>}</tbody></table></fex-card>
  </div>
</main>
